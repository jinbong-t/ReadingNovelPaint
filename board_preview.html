<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NC센터: 나의 선택 — 게임 보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #0d1117;
      color: white;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ══════════════════════════════
       사이드 패널 (좌측)
    ══════════════════════════════ */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: #161b24;
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex;
      flex-direction: column;
      padding: 24px 18px;
      gap: 24px;
      overflow-y: auto;
    }

    /* 캐릭터 카드 */
    .char-card {
      background: linear-gradient(135deg, #1e2a3a, #1a2235);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .char-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid #6366f1;
      object-fit: cover;
      box-shadow: 0 0 16px rgba(99,102,241,0.4);
    }
    .char-name {
      font-size: 0.88rem;
      font-weight: 700;
      color: white;
    }
    .char-tag {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.06);
      padding: 3px 10px;
      border-radius: 99px;
    }

    /* 스탯 섹션 */
    .stats-section {}
    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .stat-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .stat-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .stat-name-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      font-weight: 500;
    }
    .stat-icon { font-size: 0.9rem; }
    .stat-val {
      font-size: 0.9rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .stat-bar {
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }
    .stat-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
    }
    .fill-trust { background: linear-gradient(90deg,#0ea5e9,#38bdf8); }
    .fill-indep { background: linear-gradient(90deg,#9333ea,#c084fc); }
    .fill-comm  { background: linear-gradient(90deg,#059669,#34d399); }

    /* 여정 기록 */
    .log-section { flex: 1; display: flex; flex-direction: column; gap: 8px; min-height: 0; }
    .log-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .log-item {
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
      border-left: 2px solid rgba(99,102,241,0.4);
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    /* ══════════════════════════════
       메인 보드 영역 (우측)
    ══════════════════════════════ */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* 상단 헤더 */
    .top-bar {
      background: rgba(22,27,36,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }
    .top-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
    }
    .top-stage-badge {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
      padding: 5px 16px;
      border-radius: 99px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    /* 보드 컨테이너 */
    .board-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
    }

    /* 배경 그라디언트 */
    .board-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(99,102,241,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(52,211,153,0.06) 0%, transparent 50%);
    }

    /* 보드 이미지 */
    .board-img-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .board-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 12px;
      filter: drop-shadow(0 8px 32px rgba(0,0,0,0.5));
    }

    /* 플레이어 토큰 */
    .token {
      position: absolute;
      transform: translate(-50%, -50%);
      transition: left 0.9s cubic-bezier(0.34,1.2,0.64,1),
                  top  0.9s cubic-bezier(0.34,1.2,0.64,1);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }
    .token-glow {
      position: absolute;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(99,102,241,0.4);
      animation: tokenPulse 2s ease-in-out infinite;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .token-emoji {
      position: relative;
      font-size: 2rem;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
      animation: tokenBob 2s ease-in-out infinite;
    }
    @keyframes tokenPulse {
      0%,100% { transform: translate(-50%,-50%) scale(1); opacity:0.5; }
      50%      { transform: translate(-50%,-50%) scale(1.8); opacity:0; }
    }
    @keyframes tokenBob {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }

    /* 스테이지 스팟 표시 */
    .spot {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      pointer-events: none;
    }
    .spot-circle {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      transition: all 0.3s;
    }
    .spot.active .spot-circle {
      border-color: #fbbf24;
      background: rgba(251,191,36,0.2);
      color: #fbbf24;
      box-shadow: 0 0 12px rgba(251,191,36,0.5);
    }
    .spot.done .spot-circle {
      border-color: #34d399;
      background: rgba(52,211,153,0.2);
      color: #34d399;
    }

    /* 하단 진행 바 */
    .bottom-bar {
      background: rgba(22,27,36,0.97);
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 10px 24px;
      flex-shrink: 0;
    }
    .progress-labels {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .progress-label {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
      transition: color 0.3s;
    }
    .progress-label.active { color: #fbbf24; font-weight: 700; }
    .progress-label.done   { color: #34d399; }
    .progress-track {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #c084fc, #34d399);
      border-radius: 99px;
      transition: width 0.7s ease;
      width: 0%;
    }

    /* 이벤트 카드 버튼 (우하단 플로팅) */
    .fab {
      position: absolute;
      bottom: 70px;
      right: 28px;
      z-index: 30;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border: none;
      color: white;
      padding: 0;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 8px 24px rgba(99,102,241,0.5);
      animation: fabGlow 2.5s ease-in-out infinite;
      display: flex; align-items: center; justify-content: center;
    }
    .fab:hover {
      transform: scale(1.12);
      box-shadow: 0 12px 32px rgba(99,102,241,0.7);
    }
    .fab-label {
      position: absolute;
      bottom: 78px;
      right: 96px;
      background: rgba(22,27,36,0.95);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
      z-index: 30;
      pointer-events: none;
    }
    .fab-label::after {
      content: '';
      position: absolute;
      right: -6px; top: 50%;
      transform: translateY(-50%);
      border: 6px solid transparent;
      border-left-color: rgba(22,27,36,0.95);
    }
    @keyframes fabGlow {
      0%,100% { box-shadow: 0 8px 24px rgba(99,102,241,0.5); }
      50%      { box-shadow: 0 8px 36px rgba(99,102,241,0.8); }
    }
  </style>
</head>
<body>

  <!-- 사이드 패널 -->
  <aside class="sidebar">
    <!-- 캐릭터 카드 -->
    <div class="char-card">
      <img src="/images/jenu.png" alt="제누301" class="char-avatar">
      <div class="char-name">제누 301</div>
      <div class="char-tag">NC센터 4년차</div>
    </div>

    <!-- 스탯 -->
    <div class="stats-section">
      <div class="section-label">나의 스탯</div>
      <div class="stat-row">
        <div class="stat-item">
          <div class="stat-top">
            <div class="stat-name-wrap">
              <span class="stat-icon">🤝</span>
              <span>신뢰도</span>
            </div>
            <span class="stat-val" style="color:#38bdf8" id="v-trust">5</span>
          </div>
          <div class="stat-bar">
            <div class="stat-fill fill-trust" id="f-trust" style="width:50%"></div>
          </div>
        </div>
        <div class="stat-item">
          <div class="stat-top">
            <div class="stat-name-wrap">
              <span class="stat-icon">🌱</span>
              <span>자립심</span>
            </div>
            <span class="stat-val" style="color:#c084fc" id="v-indep">5</span>
          </div>
          <div class="stat-bar">
            <div class="stat-fill fill-indep" id="f-indep" style="width:50%"></div>
          </div>
        </div>
        <div class="stat-item">
          <div class="stat-top">
            <div class="stat-name-wrap">
              <span class="stat-icon">🏘️</span>
              <span>공동체성</span>
            </div>
            <span class="stat-val" style="color:#34d399" id="v-comm">5</span>
          </div>
          <div class="stat-bar">
            <div class="stat-fill fill-comm" id="f-comm" style="width:50%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 여정 기록 -->
    <div class="log-section">
      <div class="section-label">여정 기록</div>
      <div class="log-list" id="log-list">
        <div class="log-item">🏁 NC센터에 도착했습니다. 제누의 이야기가 시작됩니다.</div>
      </div>
    </div>
  </aside>

  <!-- 메인 보드 영역 -->
  <div class="main-area">
    <!-- 상단 바 -->
    <div class="top-bar">
      <span class="top-title">NC센터: 나의 선택 — 인생게임</span>
      <span class="top-stage-badge" id="stage-badge">0단계 · 출발</span>
    </div>

    <!-- 보드 -->
    <div class="board-container">
      <div class="board-img-wrap">
        <img src="/images/board.png" alt="게임 보드" class="board-img" id="board-img">

        <!-- 플레이어 토큰 -->
        <div class="token" id="token" style="left:12%;top:82%;">
          <div class="token-glow"></div>
          <div class="token-emoji">🧒</div>
        </div>

        <!-- 스팟 표시 -->
        <div class="spot active" id="spot-0" style="left:12%;top:82%">
          <div class="spot-circle">출발</div>
        </div>
        <div class="spot" id="spot-1" style="left:28%;top:65%">
          <div class="spot-circle">면접</div>
        </div>
        <div class="spot" id="spot-2" style="left:46%;top:45%">
          <div class="spot-circle">관계</div>
        </div>
        <div class="spot" id="spot-3" style="left:62%;top:62%">
          <div class="spot-circle">갈등</div>
        </div>
        <div class="spot" id="spot-4" style="left:78%;top:40%">
          <div class="spot-circle">위기</div>
        </div>
        <div class="spot" id="spot-5" style="left:91%;top:20%">
          <div class="spot-circle">선택</div>
        </div>
      </div>

      <!-- FAB 버튼 -->
      <div class="fab-label">이벤트 카드 열기</div>
      <button class="fab" id="fab-btn" title="이벤트 카드 열기">📋</button>
    </div>

    <!-- 하단 진행 바 -->
    <div class="bottom-bar">
      <div class="progress-labels">
        <span class="progress-label active" data-s="0">출발</span>
        <span class="progress-label" data-s="1">면접</span>
        <span class="progress-label" data-s="2">관계</span>
        <span class="progress-label" data-s="3">갈등</span>
        <span class="progress-label" data-s="4">위기</span>
        <span class="progress-label" data-s="5">선택</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-fill"></div>
      </div>
    </div>
  </div>

  <script>
    // 데모용: 버튼 클릭하면 스탯 변화 시뮬레이션
    let stage = 0;
    const stageNames = ['0단계 · 출발','1단계 · 면접','2단계 · 관계','3단계 · 갈등','4단계 · 위기','5단계 · 선택'];
    const tokenPos = [
      {left:'12%',top:'82%'},
      {left:'28%',top:'65%'},
      {left:'46%',top:'45%'},
      {left:'62%',top:'62%'},
      {left:'78%',top:'40%'},
      {left:'91%',top:'20%'},
    ];

    document.getElementById('fab-btn').addEventListener('click', () => {
      // 데모용: 스테이지 진행 시뮬레이션
      if (stage < 5) {
        stage++;
        // 토큰 이동
        const pos = tokenPos[stage];
        const token = document.getElementById('token');
        token.style.left = pos.left;
        token.style.top  = pos.top;
        // 스팟 업데이트
        document.querySelectorAll('.spot').forEach((s,i) => {
          s.classList.toggle('done',   i < stage);
          s.classList.toggle('active', i === stage);
        });
        // 진행 바
        document.getElementById('prog-fill').style.width = `${(stage/5)*100}%`;
        // 배지
        document.getElementById('stage-badge').textContent = stageNames[stage];
        // 레이블
        document.querySelectorAll('.progress-label').forEach(l => {
          const s = parseInt(l.dataset.s);
          l.classList.toggle('active', s===stage);
          l.classList.toggle('done',   s<stage);
        });
        // 스탯 변화 (랜덤)
        const delta = Math.floor(Math.random()*3)+1;
        const trustEl = document.getElementById('v-trust');
        trustEl.textContent = Math.min(10, parseInt(trustEl.textContent)+delta);
        document.getElementById('f-trust').style.width = trustEl.textContent*10+'%';
        // 로그
        const log = document.createElement('div');
        log.className = 'log-item';
        log.textContent = `📍 ${stageNames[stage]} 도착!`;
        document.getElementById('log-list').appendChild(log);
      } else {
        alert('🎉 모든 스테이지 완료! 엔딩으로 이동합니다.');
      }
    });
  </script>
</body>
</html>
