<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="stage.css">
  <style>
    .puzzle-section {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
    }
    .puzzle-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 15px;
      color: #34d399;
    }
    
    .slot-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .slot {
      border: 2px dashed rgba(255,255,255,0.3);
      height: 60px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      padding: 0 15px;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: 0.3s;
    }
    
    .slot.filled {
      border-style: solid;
      border-color: #34d399;
      background: rgba(52, 211, 153, 0.1);
      color: white;
    }
    
    .card-pool {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .card {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }
    
    .card:hover {
      background: rgba(255,255,255,0.2);
    }
    
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="stage-container">
    <div class="narration-box">
      "어느 날, 사소한 말 한마디로 하나·해오름과 서먹해졌어. 이럴 때일수록 제대로 말해야 해."<br><br>
      <small style="color:#34d399">💡 힌트: 나-전달법은 [상황] -> [감정] -> [영향] -> [바람] 순서로 말하는 대화법입니다.</small>
    </div>

    <div class="puzzle-section">
      <div class="puzzle-title">나-전달법 순서 배열 (카드를 클릭해서 순서대로 넣으세요)</div>
      
      <div class="slot-container" id="slots">
        <div class="slot" data-index="0">1. (상황) ...</div>
        <div class="slot" data-index="1">2. (감정) ...</div>
        <div class="slot" data-index="2">3. (영향) ...</div>
        <div class="slot" data-index="3">4. (바람) ...</div>
      </div>
      
      <div class="card-pool" id="cards">
        <div class="card" data-id="2">나는 서운했어</div>
        <div class="card" data-id="4">다음엔 내 얘기도 끝까지 들어줬으면 해</div>
        <div class="card" data-id="1">네가 내 말을 끝까지 안 들어서</div>
        <div class="card" data-id="3">그래서 더 말하기 어려워졌어</div>
      </div>
      
      <button class="btn hidden" id="verify-btn" style="width:100%; margin-top:20px;">대화 시도하기</button>
    </div>
  </div>

  <script>
    const correctOrder = ['1', '2', '3', '4'];
    let currentOrder = [null, null, null, null];
    let attempts = 0;
    
    const slots = document.querySelectorAll('.slot');
    const cards = document.querySelectorAll('.card');
    const verifyBtn = document.getElementById('verify-btn');
    const cardPool = document.getElementById('cards');

    cards.forEach(card => {
      card.addEventListener('click', () => {
        // Find first empty slot
        const emptyIndex = currentOrder.indexOf(null);
        if (emptyIndex !== -1) {
          currentOrder[emptyIndex] = card.dataset.id;
          
          // Update slot visually
          slots[emptyIndex].innerText = card.innerText;
          slots[emptyIndex].classList.add('filled');
          slots[emptyIndex].dataset.cardId = card.dataset.id;
          
          // Hide card in pool
          card.classList.add('hidden');
          
          checkFull();
        }
      });
    });

    slots.forEach(slot => {
      slot.addEventListener('click', () => {
        if (slot.classList.contains('filled')) {
          const cardId = slot.dataset.cardId;
          const index = parseInt(slot.dataset.index);
          
          // Show card in pool again
          const card = document.querySelector(`.card[data-id="${cardId}"]`);
          card.classList.remove('hidden');
          
          // Reset slot
          currentOrder[index] = null;
          slot.classList.remove('filled');
          const placeholders = ['(상황)', '(감정)', '(영향)', '(바람)'];
          slot.innerText = `${index + 1}. ${placeholders[index]} ...`;
          delete slot.dataset.cardId;
          
          verifyBtn.classList.add('hidden');
        }
      });
    });

    function checkFull() {
      if (!currentOrder.includes(null)) {
        verifyBtn.classList.remove('hidden');
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      }
    }

    verifyBtn.addEventListener('click', () => {
      attempts++;
      const isCorrect = currentOrder.every((val, i) => val === correctOrder[i]);
      
      if (isCorrect) {
        // Success
        let reward = attempts === 1 ? 2 : 1;
        if(window.parent && window.parent.updateStats) {
          window.parent.updateStats(reward, 0, 0); // Trust up
          window.parent.loadStage(4);
        } else {
          window.location.href = '4.html';
        }
      } else {
        // Fail
        verifyBtn.style.background = '#ef4444';
        verifyBtn.innerText = '뭔가 어색해. 다시 순서를 맞춰보자.';
        setTimeout(() => {
          verifyBtn.style.background = '';
          verifyBtn.innerText = '대화 시도하기';
        }, 1500);
      }
    });
  </script>
</body>
</html>
