<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NC센터: 나의 선택</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #000;
      color: white;
      height: 100vh;
      overflow: hidden;
      cursor: default;
    }

    /* ── 배경 영상 효과 (이미지로 대체) ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .bg img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: brightness(0.25) saturate(0.6);
      animation: zoomIn 20s ease-out infinite alternate;
    }
    /* 그라디언트 오버레이 */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 100%, rgba(120,80,200,0.35) 0%, transparent 60%),
        linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.7) 100%);
    }

    @keyframes zoomIn {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }

    /* ── 파티클 효과 ── */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ── 메인 콘텐츠 ── */
    .content {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    /* 상단 배지 */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 8px 20px;
      border-radius: 99px;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.75);
      margin-bottom: 36px;
      animation: fadeDown 1.2s ease both;
    }
    .badge-dot {
      width: 6px; height: 6px;
      background: #a78bfa;
      border-radius: 50%;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

    /* 메인 타이틀 */
    .title-wrap {
      margin-bottom: 28px;
      animation: fadeUp 1.2s 0.3s ease both;
    }
    .title-sub {
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      font-weight: 300;
      letter-spacing: 0.4em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .title-main {
      font-size: clamp(3.5rem, 8vw, 6.5rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }
    .title-main .nc {
      display: block;
      color: white;
    }
    .title-main .subtitle {
      display: block;
      font-size: 0.55em;
      font-weight: 700;
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.02em;
    }

    /* 설명 텍스트 */
    .desc {
      font-size: clamp(0.9rem, 1.8vw, 1.05rem);
      color: rgba(255,255,255,0.5);
      line-height: 1.8;
      max-width: 480px;
      margin-bottom: 52px;
      font-weight: 300;
      animation: fadeUp 1.2s 0.5s ease both;
    }
    .desc strong {
      color: rgba(255,255,255,0.85);
      font-weight: 700;
    }

    /* 시작 버튼 */
    .btn-start {
      position: relative;
      animation: fadeUp 1.2s 0.7s ease both;
    }
    .btn-start button {
      background: white;
      color: #1a0a3a;
      border: none;
      padding: 18px 52px;
      font-size: 1.05rem;
      font-weight: 700;
      border-radius: 99px;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      letter-spacing: 0.04em;
      transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 0 0 0 rgba(167,139,250,0);
    }
    .btn-start button:hover {
      transform: scale(1.06);
      box-shadow: 0 0 40px rgba(167,139,250,0.5), 0 20px 40px rgba(0,0,0,0.4);
    }
    .btn-start button:active { transform: scale(0.98); }

    /* 버튼 아래 힌트 */
    .btn-hint {
      margin-top: 14px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.06em;
      animation: fadeUp 1.2s 0.9s ease both;
    }

    /* 하단 스탯 미리보기 */
    .stat-preview {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 32px;
      z-index: 10;
      animation: fadeUp 1.2s 1.1s ease both;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 99px;
      font-size: 0.8rem;
    }
    .stat-pill-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* 우측 하단 로고 */
    .corner-logo {
      position: fixed;
      bottom: 32px;
      right: 40px;
      z-index: 10;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.1em;
      animation: fadeUp 1.2s 1.3s ease both;
    }

    /* 좌측 세로 텍스트 */
    .side-text {
      position: fixed;
      left: 36px;
      top: 50%;
      transform: translateY(-50%) rotate(-90deg);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.2);
      z-index: 10;
      white-space: nowrap;
      animation: fadeUp 1.5s 1.2s ease both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(24px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity:0; transform: translateY(-16px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* 화면 전환 효과 */
    body.fade-out {
      animation: blackout 0.8s ease forwards;
    }
    @keyframes blackout {
      to { opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- 배경 -->
  <div class="bg">
    <img src="/images/nc_center.png" alt="">
  </div>

  <!-- 파티클 -->
  <div class="particles" id="particles"></div>

  <!-- 좌측 세로 텍스트 -->
  <div class="side-text">NC CENTER · EDUCATIONAL GAME · 2026</div>

  <!-- 메인 콘텐츠 -->
  <div class="content">
    <div class="badge">
      <div class="badge-dot"></div>
      소설 『페인트』 연계 수업 활동
    </div>

    <div class="title-wrap">
      <div class="title-sub">N C &nbsp; C E N T E R</div>
      <h1 class="title-main">
        <span class="nc">나의 선택</span>
        <span class="subtitle">인생게임</span>
      </h1>
    </div>

    <p class="desc">
      만약 네가 <strong>부모를 직접 면접 볼 수 있다면?</strong><br>
      제누301이 되어, 인생의 갈림길에서 선택하라.<br>
      정답은 없다. 다만 진심으로 고민해야 한다.
    </p>

    <div class="btn-start">
      <button id="btn-go" onclick="startGame()">게임 시작하기 &nbsp;▶</button>
    </div>
    <div class="btn-hint">클릭하여 제누301의 이야기를 시작하세요</div>
  </div>

  <!-- 우측 하단 -->
  <div class="corner-logo">인생게임 · NC센터</div>

  <script>
    // 파티클 생성
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 3 + 1;
      p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${Math.random() * 100}%;
        animation-duration: ${Math.random() * 12 + 8}s;
        animation-delay: ${Math.random() * 10}s;
        opacity: ${Math.random() * 0.5 + 0.1};
      `;
      container.appendChild(p);
    }

    function startGame() {
      document.body.classList.add('fade-out');
      setTimeout(() => {
        alert('✅ 다음 화면(게임 보드)으로 이동합니다!\n지금은 인트로 미리보기 단계입니다.');
        document.body.classList.remove('fade-out');
      }, 800);
    }
  </script>
</body>
</html>
